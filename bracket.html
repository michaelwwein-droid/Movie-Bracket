<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Madness Bracket</title>
<style>
  body { font-family: Arial, sans-serif; background:#f4f4f4; padding:20px; }
  h1, h2 { text-align:center; }
  .bracket { display:flex; flex-wrap:wrap; justify-content:center; }
  .region { margin:10px; }
  .matchup { background:#fff; border:1px solid #ccc; margin:5px; padding:5px; width:220px; text-align:center; }
  .seed { font-weight:bold; color:#555; margin-right:5px; }
  button { width:90%; margin:3px 0; padding:5px; }
</style>
</head>
<body>

<h1>Movie Madness Bracket</h1>
<div id="bracket" class="bracket"></div>

<script>
// ------------------- BRACKET DATA -------------------
let regions = {
  "Region 1":[
    [{seed:1,name:"The Godfather"},{seed:16,name:"Groundhog Day"}],
    [{seed:8,name:"Dr. Strangelove"},{seed:9,name:"The Truman Show"}],
    [{seed:5,name:"2001: A Space Odyssey"},{seed:12,name:"It’s a Wonderful Life"}],
    [{seed:4,name:"One Flew Over the Cuckoo’s Nest"},{seed:13,name:"Best in Show"}],
    [{seed:6,name:"The Truman Show"},{seed:11,name:"Full Metal Jacket"}],
    [{seed:3,name:"Back to the Future"},{seed:14,name:"Major League"}],
    [{seed:7,name:"Jaws"},{seed:10,name:"Train Dreams"}],
    [{seed:2,name:"Star Wars: Episode IV – A New Hope"},{seed:15,name:"Casablanca"}]
  ],
  "Region 2":[
    [{seed:1,name:"The Dark Knight"},{seed:16,name:"Monty Python and the Holy Grail"}],
    [{seed:8,name:"Dead Poets Society"},{seed:9,name:"Coming to America"}],
    [{seed:5,name:"Ferris Bueller’s Day Off"},{seed:12,name:"A League of Their Own"}],
    [{seed:4,name:"Raiders of the Lost Ark"},{seed:13,name:"Moonrise Kingdom"}],
    [{seed:6,name:"The Breakfast Club"},{seed:11,name:"Cool Hand Luke"}],
    [{seed:3,name:"Whiplash"},{seed:14,name:"Harry Potter and the Deathly Hallows – Part 2"}],
    [{seed:7,name:"The Karate Kid"},{seed:10,name:"National Lampoon’s Vacation"}],
    [{seed:2,name:"Good Will Hunting"},{seed:15,name:"This Is Spinal Tap"}]
  ],
  "Region 3":[
    [{seed:1,name:"Pulp Fiction"},{seed:16,name:"Caddyshack"}],
    [{seed:8,name:"Ghostbusters"},{seed:9,name:"Avengers: Infinity War"}],
    [{seed:5,name:"La La Land"},{seed:12,name:"Catch Me If You Can"}],
    [{seed:4,name:"The Princess Bride"},{seed:13,name:"Field of Dreams"}],
    [{seed:6,name:"Inception"},{seed:11,name:"Rounders"}],
    [{seed:3,name:"The Usual Suspects"},{seed:14,name:"WarGames"}],
    [{seed:7,name:"Spider-Man: Across the Spider-Verse"},{seed:10,name:"One Flew Over the Cuckoo’s Nest"}],
    [{seed:2,name:"Se7en"},{seed:15,name:"Stranger Than Fiction"}]
  ]
};

// ------------------- STATE -------------------
let currentRegions = JSON.parse(JSON.stringify(regions)); // deep copy
let nextRoundRegions = {};
let roundNumber = 1;

// ------------------- RENDER FUNCTION -------------------
function renderBracket() {
  const container = document.getElementById("bracket");
  container.innerHTML = "";
  
  for (let regionName in currentRegions){
    const regionDiv = document.createElement("div");
    regionDiv.className = "region";
    regionDiv.innerHTML = `<h2>${regionName}</h2>`;
    
    currentRegions[regionName].forEach((matchup, i) => {
      const div = document.createElement("div");
      div.className = "matchup";
      
      // show both movies as buttons
      matchup.forEach((movie, idx) => {
        const btn = document.createElement("button");
        btn.innerHTML = `<span class="seed">(${movie.seed})</span>${movie.name}`;
        btn.onclick = () => selectWinner(regionName, i, idx);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
      });
      regionDiv.appendChild(div);
    });
    
    container.appendChild(regionDiv);
  }
}

// ------------------- WINNER FUNCTION -------------------
function selectWinner(regionName, matchupIndex, winnerIndex){
  const winner = currentRegions[regionName][matchupIndex][winnerIndex];
  
  // Store winner in next round
  if(!nextRoundRegions[regionName]) nextRoundRegions[regionName] = [];
  nextRoundRegions[regionName].push(winner);
  
  // Remove the selected matchup entirely
  currentRegions[regionName][matchupIndex] = null;
  
  // Check if all matchups are done in the current round
  let allDone = currentRegions[regionName].every(m => m===null);
  
  if(allDone){
    // Build next round
    let nextRound = [];
    for(let i=0;i<nextRoundRegions[regionName].length;i+=2){
      if(nextRoundRegions[regionName][i+1])
        nextRound.push([nextRoundRegions[regionName][i], nextRoundRegions[regionName][i+1]]);
    }
    currentRegions[regionName] = nextRound;
    nextRoundRegions[regionName] = [];
  }
  
  // Check if only one matchup left overall → finals
  let totalMatchups = 0;
  for(let r in currentRegions){
    totalMatchups += currentRegions[r].length;
  }
  
  if(totalMatchups === 1){
    // Final
    const finalRegion = Object.keys(currentRegions).find(r=>currentRegions[r].length>0);
    const finalMatch = currentRegions[finalRegion][0];
    
    const container = document.getElementById("bracket");
    container.innerHTML = "<h2>Final Round</h2>";
    
    finalMatch.forEach(m=>{
      const btn = document.createElement("button");
      btn.innerHTML = `<span class="seed">(${m.seed})</span>${m.name}`;
      btn.onclick = ()=> container.innerHTML = `<h1>🏆 Champion: ${m.name}</h1>`;
      container.appendChild(btn);
      container.appendChild(document.createElement("br"));
    });
  } else {
    // Render updated bracket
    renderBracket();
  }
}

// ------------------- INITIAL RENDER -------------------
renderBracket();
</script>
</body>
</html>
